esphome:
  name: keypad-test
  friendly_name: Keypad Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "C3-Mini-Fallback"
    password: !secret wifi_password

captive_portal:

# --- Onboard LED (GPIO8 active-low on most C3 Super Mini boards) ---

light:
  - platform: binary
    id: onboard_led
    name: "Onboard LED"
    output: led_output

output:
  - platform: gpio
    id: led_output
    pin:
      number: GPIO8
      inverted: true

# --- GPIO test outputs (accent LEDs / relay) ---

switch:
  - platform: gpio
    id: test_gpio2
    name: "Test GPIO2"
    pin:
      number: GPIO2
      mode: OUTPUT

  - platform: gpio
    id: test_gpio3
    name: "Test GPIO3"
    pin:
      number: GPIO3
      mode: OUTPUT

  - platform: gpio
    id: test_gpio10
    name: "Test GPIO10"
    pin:
      number: GPIO10
      mode: OUTPUT

# --- GPIO test inputs ---

binary_sensor:
  - platform: gpio
    id: test_input_gpio4
    name: "Input GPIO4"
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

  - platform: gpio
    id: test_input_gpio5
    name: "Input GPIO5"
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

  - platform: status
    name: "Status"

# --- Wiegand on GPIO0 / GPIO1 (board pins labeled 0 and 1) ---

wiegand:
  - id: my_keypad
    d0:
      number: GPIO0
      mode:
        input: true
        pullup: true
    d1:
      number: GPIO1
      mode:
        input: true
        pullup: true
    on_key:
      - lambda: 'ESP_LOGI("TEST", "=== KEY PRESS: %d ===", x);'
    on_tag:
      - lambda: 'ESP_LOGI("TEST", "=== TAG: %s ===", x.c_str());'
    on_raw:
      - lambda: 'ESP_LOGI("TEST", "=== RAW: %d bits, value %llx ===", bits, value);'

key_collector:
  - id: pin_collector
    source_id: my_keypad
    min_length: 4
    max_length: 8
    end_keys: "#"
    back_keys: "*"
    allowed_keys: "0123456789"
    timeout: 10s
    on_progress:
      - lambda: 'ESP_LOGI("TEST", "--- TYPING: ''%s'' (length: %d) ---", x.c_str(), x.length());'
    on_result:
      - lambda: |-
          ESP_LOGI("TEST", "*** CODE SUBMITTED: '%s' ***", x.c_str());
          if (x == "1234") {
            ESP_LOGI("TEST", ">>> MATCHED test code 1234 <<<");
            id(test_result).publish_state("PASS - code 1234 matched");
            id(test_gpio2).turn_on();
          } else {
            ESP_LOGW("TEST", ">>> NO MATCH for '%s' <<<", x.c_str());
            id(test_result).publish_state("Code '" + x + "' did not match");
          }
    on_timeout:
      - lambda: 'ESP_LOGW("TEST", "--- TIMEOUT: partial ''%s'' discarded ---", x.c_str());'

# --- Diagnostics ---

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

  - platform: uptime
    name: "Uptime"

  - platform: internal_temperature
    name: "CPU Temperature"
    update_interval: 60s

text_sensor:
  - platform: template
    name: "Test Result"
    id: test_result
    icon: mdi:check-circle

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Blink LED"
    icon: mdi:led-on
    on_press:
      - light.turn_on: onboard_led
      - delay: 500ms
      - light.turn_off: onboard_led
      - delay: 500ms
      - light.turn_on: onboard_led
      - delay: 500ms
      - light.turn_off: onboard_led

  - platform: template
    name: "Pulse GPIO2"
    icon: mdi:electric-switch
    on_press:
      - switch.turn_on: test_gpio2
      - delay: 3s
      - switch.turn_off: test_gpio2

  - platform: template
    name: "Clear Test Result"
    icon: mdi:eraser
    on_press:
      - lambda: 'id(test_result).publish_state("Waiting...");'
