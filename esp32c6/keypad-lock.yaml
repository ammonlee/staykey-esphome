              root["slot_7"]  = id(tag_slot_7);  root["slot_8"]  = id(tag_slot_8);
              root["slot_9"]  = id(tag_slot_9);  root["slot_10"] = id(tag_slot_10);
              root["slot_11"] = id(tag_slot_11); root["slot_12"] = id(tag_slot_12);
              root["slot_13"] = id(tag_slot_13); root["slot_14"] = id(tag_slot_14);
