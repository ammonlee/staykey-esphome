esphome:
  name: keypad-lock
  friendly_name: Keypad Lock

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: set_code
      supports_response: optional
      variables:
        slot: int
        code: string
      then:
        - if:
            condition:
              lambda: 'return slot >= 1 && slot <= 30 && code.length() >= 4;'
            then:
              - if:
                  condition:
                    lambda: |-
                      const std::string* slots[] = {
                        &id(code_slot_1),  &id(code_slot_2),  &id(code_slot_3),
                        &id(code_slot_4),  &id(code_slot_5),  &id(code_slot_6),
                        &id(code_slot_7),  &id(code_slot_8),  &id(code_slot_9),
                        &id(code_slot_10), &id(code_slot_11), &id(code_slot_12),
                        &id(code_slot_13), &id(code_slot_14), &id(code_slot_15),
                        &id(code_slot_16), &id(code_slot_17), &id(code_slot_18),
                        &id(code_slot_19), &id(code_slot_20), &id(code_slot_21),
                        &id(code_slot_22), &id(code_slot_23), &id(code_slot_24),
                        &id(code_slot_25), &id(code_slot_26), &id(code_slot_27),
                        &id(code_slot_28), &id(code_slot_29), &id(code_slot_30)
                      };
                      for (int i = 0; i < 30; i++) {
                        if (i != (slot - 1) && !slots[i]->empty() && *slots[i] == code) {
                          return false;
                        }
                      }
                      return true;
                  then:
                    - lambda: |-
                        std::string *target = nullptr;
                        switch (slot) {
                          case 1:  target = &id(code_slot_1);  break;
                          case 2:  target = &id(code_slot_2);  break;
                          case 3:  target = &id(code_slot_3);  break;
                          case 4:  target = &id(code_slot_4);  break;
                          case 5:  target = &id(code_slot_5);  break;
                          case 6:  target = &id(code_slot_6);  break;
                          case 7:  target = &id(code_slot_7);  break;
                          case 8:  target = &id(code_slot_8);  break;
                          case 9:  target = &id(code_slot_9);  break;
                          case 10: target = &id(code_slot_10); break;
                          case 11: target = &id(code_slot_11); break;
                          case 12: target = &id(code_slot_12); break;
                          case 13: target = &id(code_slot_13); break;
                          case 14: target = &id(code_slot_14); break;
                          case 15: target = &id(code_slot_15); break;
                          case 16: target = &id(code_slot_16); break;
                          case 17: target = &id(code_slot_17); break;
                          case 18: target = &id(code_slot_18); break;
                          case 19: target = &id(code_slot_19); break;
                          case 20: target = &id(code_slot_20); break;
                          case 21: target = &id(code_slot_21); break;
                          case 22: target = &id(code_slot_22); break;
                          case 23: target = &id(code_slot_23); break;
                          case 24: target = &id(code_slot_24); break;
                          case 25: target = &id(code_slot_25); break;
                          case 26: target = &id(code_slot_26); break;
                          case 27: target = &id(code_slot_27); break;
                          case 28: target = &id(code_slot_28); break;
                          case 29: target = &id(code_slot_29); break;
                          case 30: target = &id(code_slot_30); break;
                        }
                        if (target) {
                          *target = code;
                          ESP_LOGI("keypad", "Code set in slot %d", slot);
                        }
                    - homeassistant.event:
                        event: esphome.keypad_code_set
                        data:
                          slot: !lambda 'return to_string(slot);'
                          success: "true"
                    - api.respond:
                        data: !lambda |-
                          root["slot"] = slot;
                          root["success"] = true;
                          root["code"] = code;
                          root["message"] = "Code set in slot " + to_string(slot);
                  else:
                    - api.respond:
                        success: false
                        error_message: "Code already in use in another slot"
            else:
              - api.respond:
                  success: false
                  error_message: "Invalid slot (1-30) or code too short (min 4 digits)"

    - action: clear_code
      supports_response: optional
      variables:
        slot: int
      then:
        - if:
            condition:
              lambda: 'return slot >= 1 && slot <= 30;'
            then:
              - lambda: |-
                  std::string *target = nullptr;
                  switch (slot) {
                    case 1:  target = &id(code_slot_1);  break;
                    case 2:  target = &id(code_slot_2);  break;
                    case 3:  target = &id(code_slot_3);  break;
                    case 4:  target = &id(code_slot_4);  break;
                    case 5:  target = &id(code_slot_5);  break;
                    case 6:  target = &id(code_slot_6);  break;
                    case 7:  target = &id(code_slot_7);  break;
                    case 8:  target = &id(code_slot_8);  break;
                    case 9:  target = &id(code_slot_9);  break;
                    case 10: target = &id(code_slot_10); break;
                    case 11: target = &id(code_slot_11); break;
                    case 12: target = &id(code_slot_12); break;
                    case 13: target = &id(code_slot_13); break;
                    case 14: target = &id(code_slot_14); break;
                    case 15: target = &id(code_slot_15); break;
                    case 16: target = &id(code_slot_16); break;
                    case 17: target = &id(code_slot_17); break;
                    case 18: target = &id(code_slot_18); break;
                    case 19: target = &id(code_slot_19); break;
                    case 20: target = &id(code_slot_20); break;
                    case 21: target = &id(code_slot_21); break;
                    case 22: target = &id(code_slot_22); break;
                    case 23: target = &id(code_slot_23); break;
                    case 24: target = &id(code_slot_24); break;
                    case 25: target = &id(code_slot_25); break;
                    case 26: target = &id(code_slot_26); break;
                    case 27: target = &id(code_slot_27); break;
                    case 28: target = &id(code_slot_28); break;
                    case 29: target = &id(code_slot_29); break;
                    case 30: target = &id(code_slot_30); break;
                  }
                  if (target) {
                    *target = "";
                    ESP_LOGI("keypad", "Slot %d cleared", slot);
                  }
              - homeassistant.event:
                  event: esphome.keypad_code_cleared
                  data:
                    slot: !lambda 'return to_string(slot);'
                    success: "true"
              - api.respond:
                  data: !lambda |-
                    root["slot"] = slot;
                    root["success"] = true;
                    root["message"] = "Slot " + to_string(slot) + " cleared";
            else:
              - api.respond:
                  success: false
                  error_message: "Invalid slot (must be 1-30)"

    - action: get_codes
      supports_response: only
      then:
        - api.respond:
            data: !lambda |-
              root["slot_1"]  = id(code_slot_1);  root["slot_2"]  = id(code_slot_2);
              root["slot_3"]  = id(code_slot_3);  root["slot_4"]  = id(code_slot_4);
              root["slot_5"]  = id(code_slot_5);  root["slot_6"]  = id(code_slot_6);
              root["slot_7"]  = id(code_slot_7);  root["slot_8"]  = id(code_slot_8);
              root["slot_9"]  = id(code_slot_9);  root["slot_10"] = id(code_slot_10);
              root["slot_11"] = id(code_slot_11); root["slot_12"] = id(code_slot_12);
              root["slot_13"] = id(code_slot_13); root["slot_14"] = id(code_slot_14);
              root["slot_15"] = id(code_slot_15); root["slot_16"] = id(code_slot_16);
              root["slot_17"] = id(code_slot_17); root["slot_18"] = id(code_slot_18);
              root["slot_19"] = id(code_slot_19); root["slot_20"] = id(code_slot_20);
              root["slot_21"] = id(code_slot_21); root["slot_22"] = id(code_slot_22);
              root["slot_23"] = id(code_slot_23); root["slot_24"] = id(code_slot_24);
              root["slot_25"] = id(code_slot_25); root["slot_26"] = id(code_slot_26);
              root["slot_27"] = id(code_slot_27); root["slot_28"] = id(code_slot_28);
              root["slot_29"] = id(code_slot_29); root["slot_30"] = id(code_slot_30);

    - action: set_tag
      supports_response: optional
      variables:
        slot: int
        tag: string
      then:
        - if:
            condition:
              lambda: 'return slot >= 1 && slot <= 30 && tag.length() > 0;'
            then:
              - if:
                  condition:
                    lambda: |-
                      const std::string* slots[] = {
                        &id(tag_slot_1),  &id(tag_slot_2),  &id(tag_slot_3),
                        &id(tag_slot_4),  &id(tag_slot_5),  &id(tag_slot_6),
                        &id(tag_slot_7),  &id(tag_slot_8),  &id(tag_slot_9),
                        &id(tag_slot_10), &id(tag_slot_11), &id(tag_slot_12),
                        &id(tag_slot_13), &id(tag_slot_14), &id(tag_slot_15),
                        &id(tag_slot_16), &id(tag_slot_17), &id(tag_slot_18),
                        &id(tag_slot_19), &id(tag_slot_20), &id(tag_slot_21),
                        &id(tag_slot_22), &id(tag_slot_23), &id(tag_slot_24),
                        &id(tag_slot_25), &id(tag_slot_26), &id(tag_slot_27),
                        &id(tag_slot_28), &id(tag_slot_29), &id(tag_slot_30)
                      };
                      for (int i = 0; i < 30; i++) {
                        if (i != (slot - 1) && !slots[i]->empty() && *slots[i] == tag) {
                          return false;
                        }
                      }
                      return true;
                  then:
                    - lambda: |-
                        std::string *target = nullptr;
                        switch (slot) {
                          case 1:  target = &id(tag_slot_1);  break;
                          case 2:  target = &id(tag_slot_2);  break;
                          case 3:  target = &id(tag_slot_3);  break;
                          case 4:  target = &id(tag_slot_4);  break;
                          case 5:  target = &id(tag_slot_5);  break;
                          case 6:  target = &id(tag_slot_6);  break;
                          case 7:  target = &id(tag_slot_7);  break;
                          case 8:  target = &id(tag_slot_8);  break;
                          case 9:  target = &id(tag_slot_9);  break;
                          case 10: target = &id(tag_slot_10); break;
                          case 11: target = &id(tag_slot_11); break;
                          case 12: target = &id(tag_slot_12); break;
                          case 13: target = &id(tag_slot_13); break;
                          case 14: target = &id(tag_slot_14); break;
                          case 15: target = &id(tag_slot_15); break;
                          case 16: target = &id(tag_slot_16); break;
                          case 17: target = &id(tag_slot_17); break;
                          case 18: target = &id(tag_slot_18); break;
                          case 19: target = &id(tag_slot_19); break;
                          case 20: target = &id(tag_slot_20); break;
                          case 21: target = &id(tag_slot_21); break;
                          case 22: target = &id(tag_slot_22); break;
                          case 23: target = &id(tag_slot_23); break;
                          case 24: target = &id(tag_slot_24); break;
                          case 25: target = &id(tag_slot_25); break;
                          case 26: target = &id(tag_slot_26); break;
                          case 27: target = &id(tag_slot_27); break;
                          case 28: target = &id(tag_slot_28); break;
                          case 29: target = &id(tag_slot_29); break;
                          case 30: target = &id(tag_slot_30); break;
                        }
                        if (target) {
                          *target = tag;
                          ESP_LOGI("keypad", "Tag set in slot %d: %s", slot, tag.c_str());
                        }
                    - homeassistant.event:
                        event: esphome.keypad_tag_set
                        data:
                          slot: !lambda 'return to_string(slot);'
                          success: "true"
                    - api.respond:
                        data: !lambda |-
                          root["slot"] = slot;
                          root["success"] = true;
                          root["tag"] = tag;
                          root["message"] = "Tag set in slot " + to_string(slot);
                  else:
                    - api.respond:
                        success: false
                        error_message: "Tag already registered in another slot"
            else:
              - api.respond:
                  success: false
                  error_message: "Invalid slot (1-30) or empty tag"

