              root["slot_17"] = id(tag_slot_17); root["slot_18"] = id(tag_slot_18);
              root["slot_19"] = id(tag_slot_19); root["slot_20"] = id(tag_slot_20);
              root["slot_21"] = id(tag_slot_21); root["slot_22"] = id(tag_slot_22);
              root["slot_23"] = id(tag_slot_23); root["slot_24"] = id(tag_slot_24);
              root["slot_25"] = id(tag_slot_25); root["slot_26"] = id(tag_slot_26);
              root["slot_27"] = id(tag_slot_27); root["slot_28"] = id(tag_slot_28);
              root["slot_29"] = id(tag_slot_29); root["slot_30"] = id(tag_slot_30);

    - action: set_relay_pulse_time
      supports_response: optional
      variables:
        seconds: int
      then:
        - if:
            condition:
              lambda: 'return seconds >= 1 && seconds <= 30;'
            then:
              - globals.set:
                  id: relay_pulse_seconds
                  value: !lambda 'return seconds;'
              - number.set:
                  id: relay_pulse_time
                  value: !lambda 'return seconds;'
              - api.respond:
                  data: !lambda |-
                    root["seconds"] = seconds;
                    root["success"] = true;
                    root["message"] = "Relay pulse set to " + to_string(seconds) + "s";
            else:
              - api.respond:
                  success: false
                  error_message: "Invalid value (must be 1-30 seconds)"

    - action: set_relock_time
      supports_response: optional
      variables:
        seconds: int
      then:
        - if:
            condition:
              lambda: 'return seconds >= 0 && seconds <= 120;'
            then:
              - globals.set:
                  id: relock_seconds
                  value: !lambda 'return seconds;'
              - number.set:
                  id: relock_time
                  value: !lambda 'return seconds;'
              - api.respond:
                  data: !lambda |-
                    root["seconds"] = seconds;
                    root["success"] = true;
                    root["message"] = seconds == 0
                      ? "Auto-relock disabled"
                      : "Relock time set to " + to_string(seconds) + "s";
            else:
              - api.respond:
                  success: false
                  error_message: "Invalid value (must be 0-120 seconds)"

