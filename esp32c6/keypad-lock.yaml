  - id: tag_slot_22
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_23
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_24
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_25
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_26
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_27
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_28
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_29
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: tag_slot_30
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: last_slot_used
    type: int
    restore_value: no
    initial_value: '0'
  - id: last_source
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: failed_attempts
    type: int
    restore_value: no
    initial_value: '0'
  - id: lockout_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: relay_pulse_seconds
    type: int
    restore_value: yes
    initial_value: '5'
  - id: relock_seconds
    type: int
    restore_value: yes
    initial_value: '5'
  - id: learn_mode_active
    type: bool
    restore_value: no
    initial_value: 'false'

wiegand:
  - id: my_keypad
    d0:
      number: GPIO0
      mode:
        input: true
        pullup: true
    d1:
      number: GPIO1
      mode:
        input: true
        pullup: true
    on_key:
      - lambda: 'ESP_LOGI("wiegand", "KEY PRESS: %d", x);'
    on_tag:
      - lambda: |-
          std::string scanned = x;
          id(last_scanned_tag).publish_state(scanned);
          ESP_LOGI("wiegand", "TAG: %s", scanned.c_str());

          // Learn mode: register tag in next available slot
          if (id(learn_mode_active)) {
            id(learn_mode_active) = false;
            id(tag_learn_mode).publish_state(false);

            std::string *tag_slots[] = {
              &id(tag_slot_1),  &id(tag_slot_2),  &id(tag_slot_3),
              &id(tag_slot_4),  &id(tag_slot_5),  &id(tag_slot_6),
              &id(tag_slot_7),  &id(tag_slot_8),  &id(tag_slot_9),
              &id(tag_slot_10), &id(tag_slot_11), &id(tag_slot_12),
              &id(tag_slot_13), &id(tag_slot_14), &id(tag_slot_15),
              &id(tag_slot_16), &id(tag_slot_17), &id(tag_slot_18),
              &id(tag_slot_19), &id(tag_slot_20), &id(tag_slot_21),
              &id(tag_slot_22), &id(tag_slot_23), &id(tag_slot_24),
              &id(tag_slot_25), &id(tag_slot_26), &id(tag_slot_27),
              &id(tag_slot_28), &id(tag_slot_29), &id(tag_slot_30)
            };

            // Check if tag already registered
            for (int i = 0; i < 30; i++) {
              if (!tag_slots[i]->empty() && *tag_slots[i] == scanned) {
                ESP_LOGW("keypad", "Tag already registered in slot %d", i + 1);
                return;
              }
            }

            // Find first empty slot
            for (int i = 0; i < 30; i++) {
              if (tag_slots[i]->empty()) {
                *tag_slots[i] = scanned;
                ESP_LOGI("keypad", "Tag learned in slot %d: %s", i + 1, scanned.c_str());
                return;
              }
            }
            ESP_LOGW("keypad", "All tag slots full, cannot learn tag");
            return;
          }

          // Normal mode: check tag against registered tags
          const int MAX_FAILED = 5;
          const uint32_t LOCKOUT_MS = 60000;

          if (id(failed_attempts) >= MAX_FAILED && millis() < id(lockout_until)) {
            ESP_LOGW("keypad", "Keypad locked out for %lu more seconds",
                     (id(lockout_until) - millis()) / 1000);
            id(last_slot_used) = -1;
            id(last_source) = "tag";
            id(keypad_code_event).trigger("tag_lockout");
            return;
          }
          if (id(failed_attempts) >= MAX_FAILED) {
            id(failed_attempts) = 0;
          }

          const std::string* slots[] = {
            &id(tag_slot_1),  &id(tag_slot_2),  &id(tag_slot_3),
            &id(tag_slot_4),  &id(tag_slot_5),  &id(tag_slot_6),
            &id(tag_slot_7),  &id(tag_slot_8),  &id(tag_slot_9),
            &id(tag_slot_10), &id(tag_slot_11), &id(tag_slot_12),
            &id(tag_slot_13), &id(tag_slot_14), &id(tag_slot_15),
            &id(tag_slot_16), &id(tag_slot_17), &id(tag_slot_18),
            &id(tag_slot_19), &id(tag_slot_20), &id(tag_slot_21),
            &id(tag_slot_22), &id(tag_slot_23), &id(tag_slot_24),
            &id(tag_slot_25), &id(tag_slot_26), &id(tag_slot_27),
            &id(tag_slot_28), &id(tag_slot_29), &id(tag_slot_30)
          };
          int matched_slot = 0;
          for (int i = 0; i < 30; i++) {
            if (!slots[i]->empty() && scanned == *slots[i]) {
              matched_slot = i + 1;
              break;
            }
          }
          id(last_slot_used) = matched_slot;
          id(last_source) = "tag";
          if (matched_slot > 0) {
            id(failed_attempts) = 0;
            ESP_LOGI("keypad", "Valid tag - slot %d", matched_slot);
            id(front_door_lock).unlock();
            id(keypad_code_event).trigger("tag_valid");
          } else {
            id(failed_attempts) += 1;
            ESP_LOGW("keypad", "Unknown tag (attempt %d/%d)", id(failed_attempts), MAX_FAILED);
            if (id(failed_attempts) >= MAX_FAILED) {
              id(lockout_until) = millis() + LOCKOUT_MS;
              ESP_LOGW("keypad", "Too many failed attempts, locked out for %ds", LOCKOUT_MS / 1000);
            }
            id(keypad_code_event).trigger("tag_invalid");
          }
      - homeassistant.event:
          event: esphome.keypad_code_entered
          data:
            source: !lambda 'return id(last_source);'
            code_match: !lambda 'return id(last_slot_used) > 0 ? "true" : "false";'
            slot: !lambda 'return to_string(id(last_slot_used));'
            locked_out: !lambda 'return id(last_slot_used) == -1 ? "true" : "false";'
    on_raw:
      - lambda: 'ESP_LOGI("wiegand", "RAW: %d bits, value %llx", bits, value);'

key_collector:
  - id: pin_collector
    source_id: my_keypad
    min_length: 4
    max_length: 8
    end_keys: "#"
    back_keys: "*"
    timeout: 10s
    on_result:
      - lambda: |-
          const int MAX_FAILED = 5;
          const uint32_t LOCKOUT_MS = 60000;

          if (id(failed_attempts) >= MAX_FAILED && millis() < id(lockout_until)) {
            ESP_LOGW("keypad", "Keypad locked out for %lu more seconds",
                     (id(lockout_until) - millis()) / 1000);
            id(last_slot_used) = -1;
            id(last_source) = "code";
            id(keypad_code_event).trigger("code_lockout");
            return;
          }
          if (id(failed_attempts) >= MAX_FAILED) {
            id(failed_attempts) = 0;
          }

          std::string entered = x;
          const std::string* slots[] = {
            &id(code_slot_1),  &id(code_slot_2),  &id(code_slot_3),
            &id(code_slot_4),  &id(code_slot_5),  &id(code_slot_6),
            &id(code_slot_7),  &id(code_slot_8),  &id(code_slot_9),
            &id(code_slot_10), &id(code_slot_11), &id(code_slot_12),
            &id(code_slot_13), &id(code_slot_14), &id(code_slot_15),
            &id(code_slot_16), &id(code_slot_17), &id(code_slot_18),
            &id(code_slot_19), &id(code_slot_20), &id(code_slot_21),
            &id(code_slot_22), &id(code_slot_23), &id(code_slot_24),
            &id(code_slot_25), &id(code_slot_26), &id(code_slot_27),
            &id(code_slot_28), &id(code_slot_29), &id(code_slot_30)
          };
          int matched_slot = 0;
          for (int i = 0; i < 30; i++) {
            if (!slots[i]->empty() && entered == *slots[i]) {
              matched_slot = i + 1;
              break;
            }
          }
          id(last_slot_used) = matched_slot;
          id(last_source) = "code";
          if (matched_slot > 0) {
            id(failed_attempts) = 0;
            ESP_LOGI("keypad", "Valid code entered - slot %d", matched_slot);
            id(front_door_lock).unlock();
            id(keypad_code_event).trigger("code_valid");
          } else {
            id(failed_attempts) += 1;
            ESP_LOGW("keypad", "Invalid code entered (attempt %d/%d)",
                     id(failed_attempts), MAX_FAILED);
            if (id(failed_attempts) >= MAX_FAILED) {
              id(lockout_until) = millis() + LOCKOUT_MS;
              ESP_LOGW("keypad", "Too many failed attempts, locked out for %ds",
                       LOCKOUT_MS / 1000);
            }
            id(keypad_code_event).trigger("code_invalid");
          }
      - homeassistant.event:
          event: esphome.keypad_code_entered
          data:
            source: !lambda 'return id(last_source);'
            code_match: !lambda 'return id(last_slot_used) > 0 ? "true" : "false";'
            slot: !lambda 'return to_string(id(last_slot_used));'
            locked_out: !lambda 'return id(last_slot_used) == -1 ? "true" : "false";'
    on_timeout:
      - lambda: |-
          ESP_LOGW("keypad", "Code entry timed out");
          id(keypad_code_event).trigger("code_timeout");

event:
  - platform: template
    name: "Keypad Code Entered"
    id: keypad_code_event
    device_class: button
    event_types:
      - code_valid
      - code_invalid
      - code_lockout
      - code_timeout
      - tag_valid
      - tag_invalid
      - tag_lockout

switch:
  - platform: gpio
    id: door_relay
    pin:
      number: GPIO2
      mode: OUTPUT
    internal: true
    on_turn_on:
      - delay: !lambda 'return id(relay_pulse_seconds) * 1000;'
      - switch.turn_off: door_relay

  - platform: template
    name: "Tag Learn Mode"
    id: tag_learn_mode
    icon: mdi:card-plus
    optimistic: true
    on_turn_on:
      - lambda: |-
          id(learn_mode_active) = true;
          ESP_LOGI("keypad", "Tag learn mode ON - scan a tag to register it");
      - delay: 30s
      - if:
          condition:
            lambda: 'return id(learn_mode_active);'
          then:
            - lambda: |-
                id(learn_mode_active) = false;
                ESP_LOGW("keypad", "Tag learn mode timed out");
            - switch.turn_off: tag_learn_mode
    on_turn_off:
      - lambda: |-
          id(learn_mode_active) = false;
          ESP_LOGI("keypad", "Tag learn mode OFF");

lock:
  - platform: template
    id: front_door_lock
    name: "Door Lock"
    optimistic: true
    on_unlock:
      - switch.turn_on: door_relay
      - script.execute: relock_timer

script:
  - id: relock_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(relock_seconds) > 0;'
          then:
            - delay: !lambda 'return id(relock_seconds) * 1000;'
            - lock.lock: front_door_lock

number:
  - platform: template
    name: "Relay Pulse Duration"
    id: relay_pulse_time
    unit_of_measurement: "s"
    min_value: 1
    max_value: 30
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 5
    set_action:
      - globals.set:
          id: relay_pulse_seconds
          value: !lambda 'return (int)x;'

  - platform: template
    name: "Relock Time"
    id: relock_time
    unit_of_measurement: "s"
    min_value: 0
    max_value: 120
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 5
    set_action:
      - globals.set:
          id: relock_seconds
          value: !lambda 'return (int)x;'

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

  - platform: uptime
    name: "Uptime"

  - platform: internal_temperature
    name: "CPU Temperature"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Status"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

  - platform: template
    name: "Last Scanned Tag"
    id: last_scanned_tag
    icon: mdi:card-search

button:
  - platform: restart
    name: "Restart"
