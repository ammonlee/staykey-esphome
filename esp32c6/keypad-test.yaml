esphome:
  name: keypad-test
  friendly_name: Keypad Test

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Keypad-Test-Fallback"
    password: !secret wifi_password

captive_portal:

# --- Test 1: Wiegand D0/D1 lines via level shifter ---

wiegand:
  - id: my_keypad
    d0:
      number: GPIO0
      mode:
        input: true
        pullup: true
    d1:
      number: GPIO1
      mode:
        input: true
        pullup: true
    on_key:
      - lambda: 'ESP_LOGI("TEST", "=== KEY PRESS: %d ===", x);'
    on_tag:
      - lambda: 'ESP_LOGI("TEST", "=== TAG: %s ===", x.c_str());'
    on_raw:
      - lambda: 'ESP_LOGI("TEST", "=== RAW: %d bits, value %llx ===", bits, value);'

# --- Test 2: Key collector (code entry flow) ---

key_collector:
  - id: pin_collector
    source_id: my_keypad
    min_length: 4
    max_length: 8
    end_keys: "#"
    back_keys: "*"
    allowed_keys: "0123456789"
    timeout: 10s
    on_progress:
      - lambda: |-
          ESP_LOGI("TEST", "--- TYPING: '%s' (length: %d) ---", x.c_str(), x.length());
    on_result:
      - lambda: |-
          ESP_LOGI("TEST", "*** CODE SUBMITTED: '%s' ***", x.c_str());
          if (x == "1234") {
            ESP_LOGI("TEST", ">>> MATCHED test code 1234 - relay would fire <<<");
            id(relay_test_result).publish_state("PASS - code 1234 matched");
            id(door_relay).turn_on();
          } else {
            ESP_LOGW("TEST", ">>> NO MATCH for '%s' <<<", x.c_str());
            id(relay_test_result).publish_state("Code '" + x + "' did not match test code 1234");
          }
    on_timeout:
      - lambda: |-
          ESP_LOGW("TEST", "--- TIMEOUT: partial input '%s' discarded ---", x.c_str());

# --- Test 3: Relay output on GPIO2 ---

switch:
  - platform: gpio
    id: door_relay
    name: "Test Relay"
    pin:
      number: GPIO2
      mode: OUTPUT
    on_turn_on:
      - lambda: 'ESP_LOGI("TEST", ">>> RELAY ON - GPIO2 HIGH <<<");'
      - delay: 3s
      - switch.turn_off: door_relay
    on_turn_off:
      - lambda: 'ESP_LOGI("TEST", ">>> RELAY OFF - GPIO2 LOW <<<");'

# --- Diagnostic sensors visible in HA ---

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

  - platform: uptime
    name: "Uptime"

text_sensor:
  - platform: template
    name: "Last Test Result"
    id: relay_test_result
    icon: mdi:check-circle

  - platform: wifi_info
    ip_address:
      name: "IP Address"

button:
  - platform: restart
    name: "Restart Device"

  - platform: template
    name: "Test Relay Pulse"
    icon: mdi:electric-switch
    on_press:
      - lambda: 'ESP_LOGI("TEST", ">>> MANUAL RELAY TEST <<<");'
      - switch.turn_on: door_relay

  - platform: template
    name: "Clear Test Result"
    icon: mdi:eraser
    on_press:
      - lambda: |-
          id(relay_test_result).publish_state("Waiting for test...");
          ESP_LOGI("TEST", "--- Test result cleared ---");
